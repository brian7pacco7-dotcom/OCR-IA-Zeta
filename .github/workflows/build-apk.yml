name: Build OCR IA Zeta APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Create Android project
        run: |
          mkdir -p app/src/main/java/com/geozeta/ocria
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "OCRIAZeta"
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF

          cat > gradle.properties <<'EOF'
          android.useAndroidX=true
          android.nonTransitiveRClass=false
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          def geminiKey = System.getenv("GEMINI_API_KEY") ?: ""

          android {
              namespace 'com.geozeta.ocria'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.geozeta.ocria'
                  minSdk 23
                  targetSdk 35
                  versionCode 2
                  versionName '1.1'
                  buildConfigField "String", "GEMINI_API_KEY", "\"${geminiKey}\""
              }

              buildFeatures {
                  buildConfig true
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'com.google.android.gms:play-services-mlkit-text-recognition:19.0.1'
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">OCR IA Zeta</string>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">true</item>
                  <item name="android:statusBarColor">#FFFFFF</item>
                  <item name="android:navigationBarColor">#FFFFFF</item>
                  <item name="android:colorAccent">#0B3D91</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>

              <application
                  android:theme="@style/AppTheme"
                  android:label="OCR IA Zeta"
                  android:allowBackup="true"
                  android:usesCleartextTraffic="true"
                  android:resizeableActivity="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>

                  </activity>

              </application>

          </manifest>
          EOF

          cat > app/src/main/java/com/geozeta/ocria/MainActivity.java <<'EOF'
          package com.geozeta.ocria;

          import android.Manifest;
          import android.app.Activity;
          import android.content.ClipData;
          import android.content.ClipboardManager;
          import android.content.Context;
          import android.content.Intent;
          import android.graphics.Bitmap;
          import android.graphics.ImageDecoder;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.MediaStore;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.Button;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.ProgressBar;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.widget.Toast;

          import com.google.mlkit.vision.common.InputImage;
          import com.google.mlkit.vision.text.TextRecognition;
          import com.google.mlkit.vision.text.TextRecognizer;
          import com.google.mlkit.vision.text.latin.TextRecognizerOptions;

          import org.json.JSONArray;
          import org.json.JSONObject;

          import java.io.BufferedReader;
          import java.io.InputStreamReader;
          import java.io.OutputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.nio.charset.StandardCharsets;

          public class MainActivity extends Activity {

              private static final int PICK_IMAGE = 100;
              private static final int TAKE_PHOTO = 200;

              private Bitmap currentBitmap;
              private ImageView imagePreview;
              private TextView ocrText;
              private TextView answerText;
              private ProgressBar progress;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  if (Build.VERSION.SDK_INT >= 23) {
                      requestPermissions(new String[]{
                              Manifest.permission.CAMERA,
                              Manifest.permission.INTERNET,
                              Manifest.permission.READ_EXTERNAL_STORAGE
                      }, 1);
                  }

                  ScrollView scroll = new ScrollView(this);

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(32, 36, 32, 36);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  scroll.addView(root);

                  TextView title = new TextView(this);
                  title.setText("OCR IA Zeta");
                  title.setTextSize(28);
                  title.setGravity(Gravity.CENTER);
                  title.setTextColor(0xFF0B3D91);
                  title.setPadding(0, 0, 0, 10);
                  root.addView(title);

                  TextView subtitle = new TextView(this);
                  subtitle.setText("Foto o imagen → OCR → respuesta con IA");
                  subtitle.setTextSize(15);
                  subtitle.setGravity(Gravity.CENTER);
                  subtitle.setTextColor(0xFF444444);
                  subtitle.setPadding(0, 0, 0, 24);
                  root.addView(subtitle);

                  Button cameraBtn = makeButton("Tomar foto");
                  Button galleryBtn = makeButton("Importar imagen");
                  Button ocrBtn = makeButton("Extraer texto OCR");
                  Button aiBtn = makeButton("Responder con IA");
                  Button copyTextBtn = makeButton("Copiar texto OCR");
                  Button copyAnswerBtn = makeButton("Copiar respuesta");

                  root.addView(cameraBtn);
                  root.addView(galleryBtn);

                  imagePreview = new ImageView(this);
                  imagePreview.setAdjustViewBounds(true);
                  imagePreview.setMaxHeight(700);
                  imagePreview.setPadding(0, 20, 0, 20);
                  root.addView(imagePreview);

                  root.addView(ocrBtn);

                  progress = new ProgressBar(this);
                  progress.setVisibility(View.GONE);
                  root.addView(progress);

                  root.addView(makeLabel("Texto detectado:"));

                  ocrText = makeBox("Aquí aparecerá el texto reconocido.");
                  root.addView(ocrText);

                  root.addView(copyTextBtn);
                  root.addView(aiBtn);

                  root.addView(makeLabel("Respuesta IA:"));

                  answerText = makeBox("Aquí aparecerá la respuesta.");
                  root.addView(answerText);

                  root.addView(copyAnswerBtn);

                  cameraBtn.setOnClickListener(v -> openCamera());
                  galleryBtn.setOnClickListener(v -> openGallery());
                  ocrBtn.setOnClickListener(v -> runOCR());
                  aiBtn.setOnClickListener(v -> askAI());
                  copyTextBtn.setOnClickListener(v -> copyToClipboard("Texto OCR", ocrText.getText().toString()));
                  copyAnswerBtn.setOnClickListener(v -> copyToClipboard("Respuesta IA", answerText.getText().toString()));

                  setContentView(scroll);
              }

              private Button makeButton(String text) {
                  Button button = new Button(this);
                  button.setText(text);
                  button.setTextSize(18);
                  button.setAllCaps(false);
                  button.setPadding(8, 14, 8, 14);
                  return button;
              }

              private TextView makeLabel(String text) {
                  TextView label = new TextView(this);
                  label.setText(text);
                  label.setTextSize(18);
                  label.setTextColor(0xFF111111);
                  label.setPadding(0, 24, 0, 8);
                  return label;
              }

              private TextView makeBox(String text) {
                  TextView box = new TextView(this);
                  box.setText(text);
                  box.setTextSize(16);
                  box.setTextColor(0xFF111111);
                  box.setPadding(20, 20, 20, 20);
                  box.setBackgroundColor(0xFFEFEFEF);
                  box.setMinLines(4);
                  return box;
              }

              private void openGallery() {
                  Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                  intent.setType("image/*");
                  startActivityForResult(Intent.createChooser(intent, "Selecciona imagen"), PICK_IMAGE);
              }

              private void openCamera() {
                  Intent intent = new Intent(MediaStore.ACTION_IMAGE_CAPTURE);
                  startActivityForResult(intent, TAKE_PHOTO);
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);

                  if (resultCode != RESULT_OK || data == null) {
                      return;
                  }

                  try {
                      if (requestCode == PICK_IMAGE) {
                          Uri uri = data.getData();

                          if (uri == null) {
                              showToast("No se pudo leer la imagen");
                              return;
                          }

                          if (Build.VERSION.SDK_INT >= 28) {
                              ImageDecoder.Source source = ImageDecoder.createSource(getContentResolver(), uri);
                              currentBitmap = ImageDecoder.decodeBitmap(source);
                          } else {
                              currentBitmap = MediaStore.Images.Media.getBitmap(getContentResolver(), uri);
                          }

                      } else if (requestCode == TAKE_PHOTO) {
                          Bundle extras = data.getExtras();

                          if (extras == null || extras.get("data") == null) {
                              showToast("No se pudo tomar la foto");
                              return;
                          }

                          currentBitmap = (Bitmap) extras.get("data");
                      }

                      if (currentBitmap != null) {
                          currentBitmap = currentBitmap.copy(Bitmap.Config.ARGB_8888, true);
                          imagePreview.setImageBitmap(currentBitmap);
                          ocrText.setText("Imagen cargada. Presiona: Extraer texto OCR.");
                          answerText.setText("Aquí aparecerá la respuesta.");
                          showToast("Imagen cargada");
                      }

                  } catch (Exception e) {
                      showToast("Error al cargar imagen");
                  }
              }

              private void runOCR() {
                  if (currentBitmap == null) {
                      showToast("Primero toma o importa una imagen");
                      return;
                  }

                  progress.setVisibility(View.VISIBLE);
                  ocrText.setText("Leyendo texto...");

                  InputImage image = InputImage.fromBitmap(currentBitmap, 0);
                  TextRecognizer recognizer = TextRecognition.getClient(TextRecognizerOptions.DEFAULT_OPTIONS);

                  recognizer.process(image)
                          .addOnSuccessListener(result -> {
                              progress.setVisibility(View.GONE);

                              String text = result.getText();

                              if (text == null || text.trim().isEmpty()) {
                                  ocrText.setText("No se detectó texto. Toma una foto más clara, con buena luz y sin movimiento.");
                              } else {
                                  ocrText.setText(text.trim());
                              }
                          })
                          .addOnFailureListener(e -> {
                              progress.setVisibility(View.GONE);
                              ocrText.setText("Error OCR. Intenta con otra imagen más clara.");
                          });
              }

              private void askAI() {
                  String text = ocrText.getText().toString().trim();

                  if (text.isEmpty() || text.startsWith("Aquí") || text.startsWith("Imagen cargada") || text.startsWith("No se detectó")) {
                      showToast("Primero extrae texto OCR");
                      return;
                  }

                  if (BuildConfig.GEMINI_API_KEY == null || BuildConfig.GEMINI_API_KEY.trim().isEmpty()) {
                      answerText.setText("Falta configurar GEMINI_API_KEY en GitHub Secrets para que responda la IA.");
                      return;
                  }

                  progress.setVisibility(View.VISIBLE);
                  answerText.setText("Pensando...");

                  new Thread(() -> {
                      String response = callGemini(text);

                      runOnUiThread(() -> {
                          progress.setVisibility(View.GONE);
                          answerText.setText(response);
                      });
                  }).start();
              }

              private String callGemini(String userText) {
                  try {
                      String endpoint = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + BuildConfig.GEMINI_API_KEY;

                      String prompt =
                              "Responde en español, claro, directo y útil. " +
                              "Si el texto es una pregunta, responde directo. " +
                              "Si es un ejercicio, muestra procedimiento corto y resultado. " +
                              "Si hay alternativas, indica la alternativa correcta. " +
                              "Si el texto está borroso, incompleto o no se entiende, dilo sin inventar. " +
                              "Texto OCR: " + userText;

                      JSONObject part = new JSONObject();
                      part.put("text", prompt);

                      JSONArray parts = new JSONArray();
                      parts.put(part);

                      JSONObject content = new JSONObject();
                      content.put("parts", parts);

                      JSONArray contents = new JSONArray();
                      contents.put(content);

                      JSONObject body = new JSONObject();
                      body.put("contents", contents);

                      URL url = new URL(endpoint);
                      HttpURLConnection connection = (HttpURLConnection) url.openConnection();
                      connection.setRequestMethod("POST");
                      connection.setRequestProperty("Content-Type", "application/json; charset=UTF-8");
                      connection.setDoOutput(true);
                      connection.setConnectTimeout(20000);
                      connection.setReadTimeout(30000);

                      OutputStream os = connection.getOutputStream();
                      os.write(body.toString().getBytes(StandardCharsets.UTF_8));
                      os.close();

                      BufferedReader br = new BufferedReader(new InputStreamReader(
                              connection.getResponseCode() >= 400
                                      ? connection.getErrorStream()
                                      : connection.getInputStream()
                      ));

                      StringBuilder sb = new StringBuilder();
                      String line;

                      while ((line = br.readLine()) != null) {
                          sb.append(line);
                      }

                      br.close();

                      JSONObject json = new JSONObject(sb.toString());

                      if (json.has("error")) {
                          JSONObject error = json.getJSONObject("error");
                          return "Error de Gemini: " + error.optString("message", "Revisa la clave API o el modelo.");
                      }

                      if (!json.has("candidates")) {
                          return "Gemini no devolvió respuesta. Revisa que la clave API esté activa y que tengas internet.";
                      }

                      JSONArray candidates = json.getJSONArray("candidates");

                      if (candidates.length() == 0) {
                          return "Gemini no generó respuesta. Intenta con una imagen más clara o una pregunta más corta.";
                      }

                      return candidates
                              .getJSONObject(0)
                              .getJSONObject("content")
                              .getJSONArray("parts")
                              .getJSONObject(0)
                              .getString("text")
                              .trim();

                  } catch (Exception e) {
                      return "Error con IA. Revisa internet o la clave Gemini. Detalle: " + e.getMessage();
                  }
              }

              private void copyToClipboard(String label, String text) {
                  ClipboardManager clipboard = (ClipboardManager) getSystemService(Context.CLIPBOARD_SERVICE);
                  ClipData clip = ClipData.newPlainText(label, text);
                  clipboard.setPrimaryClip(clip);
                  showToast("Copiado");
              }

              private void showToast(String message) {
                  Toast.makeText(this, message, Toast.LENGTH_SHORT).show();
              }
          }
          EOF

      - name: Build APK
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OCR-IA-Zeta-APK
          path: app/build/outputs/apk/debug/app-debug.apk
